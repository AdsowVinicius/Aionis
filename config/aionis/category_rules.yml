# Regras globais de classificação (workspace_id nulo).
# Motor: Aionis::ClassificationEngine. Para alterar: edite e rode rails db:seed.
#
# Campos:
#   name         nome da regra (identidade da seed — deve ser único entre globais)
#   priority     maior vence em caso de múltiplos matches (default 0)
#   kind         income | expense (vazio = qualquer)
#   keywords     palavras separadas por vírgula, casadas na descrição (sem acento)
#   category     nome EXATO de uma categoria global (config/aionis/categories.yml)
#   scope        personal | business | mixed | review
#   recurrence   recurring | occasional | one_off
#   cost_center  centro de custo sugerido (texto livre)
#   confidence   confiança base 0..100 (default 70)
#
# cost_type e essentiality vêm da categoria; só preencha aqui para sobrescrever.

