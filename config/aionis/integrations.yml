# Camada de Integração — provedores plugáveis (Aionis::Integrations).
# ---------------------------------------------------------------------------
# Nenhuma chamada externa está implementada nesta etapa: o provedor ativo é
# sempre "null" (stub seguro). Para ligar um provedor real no futuro:
#   1. crie a classe concreta (ex.: Aionis::Integrations::Ocr::TesseractProvider)
#   2. adicione-a em `providers:` do tipo correspondente
#   3. troque `provider:` para a chave dela (ou controle por ENV)
#   4. preencha as credenciais em `settings:` via ENV
# O restante do app NÃO muda — só consome Aionis::Integrations.<tipo>.
#
# NUNCA coloque segredos aqui. Use apenas referências a ENV (CLAUDE.md seção 9).

default: &default
  whatsapp:
    # Ative com WHATSAPP_PROVIDER=evolution (Evolution API self-hosted).
    provider: "<%= ENV.fetch('WHATSAPP_PROVIDER', 'null') %>"
    providers:
      evolution: "Aionis::Integrations::Whatsapp::EvolutionProvider"
    settings:
      base_url:      "<%= ENV['EVOLUTION_BASE_URL'] %>"
      api_key:       "<%= ENV['EVOLUTION_API_KEY'] %>"
      instance:      "<%= ENV['EVOLUTION_INSTANCE'] %>"
      webhook_token: "<%= ENV['EVOLUTION_WEBHOOK_TOKEN'] %>"
      timeout:       "<%= ENV.fetch('EVOLUTION_TIMEOUT', '15') %>"

  open_finance:
    # Ative com OPEN_FINANCE_PROVIDER=pluggy. Belvo/Quanto ficam prontos para
    # plugar (basta implementar a classe e apontar aqui).
    provider: "<%= ENV.fetch('OPEN_FINANCE_PROVIDER', 'null') %>"
    providers:
      pluggy: "Aionis::Integrations::OpenFinance::PluggyProvider"
      # belvo:  "Aionis::Integrations::OpenFinance::BelvoProvider"
      # quanto: "Aionis::Integrations::OpenFinance::QuantoProvider"
    settings:
      client_id:     "<%= ENV['PLUGGY_CLIENT_ID'] %>"
      client_secret: "<%= ENV['PLUGGY_CLIENT_SECRET'] %>"
      base_url:      "<%= ENV['PLUGGY_BASE_URL'] %>"
      connect_url:   "<%= ENV['PLUGGY_CONNECT_URL'] %>"
      timeout:       "<%= ENV.fetch('PLUGGY_TIMEOUT', '20') %>"

  ocr:
    # Ative com OCR_PROVIDER=tesseract (requer python3 + opencv + pytesseract +
    # pymupdf + binário tesseract com idioma 'por'). Sem isso, fica em "null".
    provider: "<%= ENV.fetch('OCR_PROVIDER', 'null') %>"
    providers:
      tesseract: "Aionis::Integrations::Ocr::TesseractProvider"
    settings:
      python_bin:  "<%= ENV.fetch('OCR_PYTHON_BIN', 'python3') %>"
      worker_path: "<%= ENV['OCR_WORKER_PATH'] %>"
      lang:        "<%= ENV.fetch('OCR_LANG', 'por') %>"
      timeout:     "<%= ENV.fetch('OCR_TIMEOUT', '30') %>"
      dpi:         "<%= ENV.fetch('OCR_DPI', '200') %>"

  ai:
    provider: "<%= ENV.fetch('AI_PROVIDER', 'null') %>"
    providers:
      # anthropic: "Aionis::Integrations::Ai::AnthropicProvider"
    settings:
      api_key: "<%= ENV['AI_API_KEY'] %>"
      model:   "<%= ENV.fetch('AI_MODEL', 'claude-haiku-4-5-20251001') %>"

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
